services:
  # -- PostgreSQL Database -----------------------------------------------------
  db:
    image: postgres:15
    container_name: dms_db_prod
    restart: always
    environment:
      - POSTGRES_DB=dms_tresvance
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 20s
      retries: 10

  # -- Django Backend ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms_backend_prod
    restart: always
    environment:
      - SECRET_KEY=django-insecure-prod-change-later
      - DEBUG=False
      - ALLOWED_HOSTS=tresvance.com,.tresvance.com,dmsdental.tresvance.com,194.164.148.205,localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=https://dmsdental.tresvance.com,https://tresvance.com,http://localhost:8000
      - CORS_ALLOW_ALL=True
      - USE_SQLITE=False
      - DB_NAME=dms_tresvance
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "4000:8000"
    volumes:
      - dms_data:/app/data
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pip install gunicorn &&
             mkdir -p /app/data &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn dms_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  # -- React Frontend ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: dms_frontend_prod
    restart: always
    ports:
      - "4001:80"
    depends_on:
      - backend

volumes:
  dms_data:
  pg_data:
  media_files: