services:

  # ── Django Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - USE_SQLITE=True
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: >
      sh -c "python manage.py makemigrations users &&
             python manage.py makemigrations clinics &&
             python manage.py makemigrations patients &&
             python manage.py makemigrations appointments &&
             python manage.py makemigrations records &&
             python manage.py makemigrations medicines &&
             python manage.py makemigrations billing &&
             python manage.py makemigrations support &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ── React Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms_frontend
    restart: always
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  media_files: