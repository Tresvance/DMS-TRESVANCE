version: '3.9'

services:

  # ── MySQL Database ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: dms_db
    restart: always
    environment:
      MYSQL_DATABASE: dms_tresvance
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dms_user
      MYSQL_PASSWORD: dms_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Django Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms_backend
    restart: always
    environment:
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_NAME: dms_tresvance
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: db
      DB_PORT: 3306
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: >
      sh -c "python manage.py makemigrations users &&
             python manage.py makemigrations clinics &&
             python manage.py makemigrations patients &&
             python manage.py makemigrations appointments &&
             python manage.py makemigrations records &&
             python manage.py makemigrations medicines &&
             python manage.py makemigrations billing &&
             python manage.py makemigrations support &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ── React Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  media_files: