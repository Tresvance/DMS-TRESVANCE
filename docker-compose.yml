version: '3.9'

services:

  # ── PostgreSQL Database ─────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dms_db
    restart: always
    environment:
      POSTGRES_DB: dms_tresvance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms_backend
    restart: always
    environment:
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_NAME: dms_tresvance
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: >
      sh -c "python manage.py makemigrations users &&
             python manage.py makemigrations clinics &&
             python manage.py makemigrations patients &&
             python manage.py makemigrations appointments &&
             python manage.py makemigrations records &&
             python manage.py makemigrations medicines &&
             python manage.py makemigrations billing &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ── React Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files: